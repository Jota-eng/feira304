<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="theme-color" content="#07070f"/>
<title>Melhor Versão</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,400&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{
  --bg:#07070f;--bg2:#0d0d1c;--bg3:#12121f;--bg4:#181828;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.13);
  --text:#e8e8f0;--muted:#5a5a78;--muted2:#8888aa;
  --gold:#c9a84c;--gold2:#f0c96e;
  --blue:#4d8ef0;--green:#3ecf8e;--red:#e05555;
  --purple:#9b7fe8;--amber:#e8a030;
  --xp-bar:linear-gradient(90deg,#c9a84c,#f0c96e);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Crimson Pro',Georgia,serif;overflow:hidden;}
#app{display:flex;flex-direction:column;height:100dvh;max-width:480px;margin:0 auto;}
#content{flex:1;overflow-y:auto;padding:14px 14px 20px;-webkit-overflow-scrolling:touch;}
#content::-webkit-scrollbar{display:none;}

#loading{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999;gap:16px;}
#loading .spin{width:36px;height:36px;border:3px solid rgba(201,168,76,0.15);border-top-color:var(--gold);border-radius:50%;animation:spin 0.8s linear infinite;}
#loading p{font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);letter-spacing:2px;}
@keyframes spin{to{transform:rotate(360deg);}}

#char-banner{background:linear-gradient(135deg,#0d0d20 0%,#12102a 100%);border-bottom:1px solid rgba(201,168,76,0.2);padding:10px 14px;display:flex;align-items:center;gap:12px;flex-shrink:0;position:relative;overflow:hidden;}
#char-banner::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 20% 50%,rgba(201,168,76,0.06) 0%,transparent 60%);pointer-events:none;}
.char-avatar{width:52px;height:52px;border-radius:10px;flex-shrink:0;border:2px solid rgba(201,168,76,0.4);display:flex;align-items:center;justify-content:center;font-size:28px;position:relative;background:linear-gradient(135deg,#1a1830 0%,#0f0e20 100%);box-shadow:0 0 16px rgba(201,168,76,0.15);}
.char-avatar .level-badge{position:absolute;bottom:-6px;right:-6px;background:var(--gold);color:#0a0a14;font-family:'DM Mono',monospace;font-size:9px;font-weight:500;padding:2px 5px;border-radius:4px;}
.char-info{flex:1;min-width:0;}
.char-name{font-family:'Cinzel',serif;font-size:13px;color:var(--gold2);letter-spacing:0.5px;}
.char-title{font-size:11px;color:var(--muted2);font-style:italic;margin-bottom:5px;}
.xp-wrap{display:flex;align-items:center;gap:6px;}
.xp-bar-bg{flex:1;height:5px;background:rgba(255,255,255,0.07);border-radius:3px;overflow:hidden;}
.xp-bar-fill{height:100%;background:var(--xp-bar);border-radius:3px;transition:width 0.8s cubic-bezier(.22,1,.36,1);}
.xp-text{font-family:'DM Mono',monospace;font-size:9px;color:var(--gold);white-space:nowrap;}
.char-attrs{display:flex;gap:6px;margin-top:5px;}
.attr-pip{display:flex;flex-direction:column;align-items:center;gap:2px;}
.attr-pip-bar{width:3px;border-radius:2px;transition:height 0.6s ease;}
.attr-pip-label{font-size:8px;color:var(--muted);font-family:'DM Mono',monospace;}

nav{display:flex;border-top:1px solid var(--border);background:var(--bg2);flex-shrink:0;order:10;}
nav button{flex:1;background:none;border:none;border-top:2px solid transparent;padding:7px 2px 5px;color:var(--muted);cursor:pointer;font-family:'DM Mono',monospace;font-size:8px;letter-spacing:0.5px;text-transform:uppercase;transition:all 0.2s;display:flex;flex-direction:column;align-items:center;gap:2px;}
nav button .ni{font-size:14px;}
nav button.active{color:var(--gold);border-top-color:var(--gold);}

.card{background:var(--bg3);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:12px;}
.card-title{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted2);letter-spacing:2px;text-transform:uppercase;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center;}
.card-title span{color:var(--gold);}

.route-step{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:8px;margin-bottom:4px;position:relative;transition:all 0.2s;border:1px solid var(--border);background:rgba(255,255,255,0.02);}
.route-step.completed{background:rgba(201,168,76,0.07);border-color:rgba(201,168,76,0.2);}
.route-step.locked{opacity:0.38;}
.route-step.current{border-color:rgba(201,168,76,0.4);background:rgba(201,168,76,0.05);box-shadow:0 0 12px rgba(201,168,76,0.08);}
.step-connector{position:absolute;left:23px;bottom:-5px;width:2px;height:5px;background:var(--border);z-index:1;}
.step-num{width:26px;height:26px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-family:'DM Mono',monospace;font-size:10px;border:2px solid rgba(255,255,255,0.12);background:transparent;transition:all 0.2s;cursor:pointer;}
.route-step.completed .step-num{background:var(--gold);border-color:var(--gold);color:#0a0a14;}
.route-step.current .step-num{border-color:var(--gold);color:var(--gold);animation:pulse-gold 2s infinite;}
@keyframes pulse-gold{0%,100%{box-shadow:0 0 0 0 rgba(201,168,76,0.4)}50%{box-shadow:0 0 0 5px rgba(201,168,76,0)}}
.step-name{flex:1;font-size:14px;color:var(--text);}
.route-step.completed .step-name{color:var(--muted2);text-decoration:line-through;}
.del-btn{background:none;border:none;color:var(--muted);cursor:pointer;font-size:12px;padding:2px 5px;transition:color 0.2s;}
.del-btn:hover{color:var(--red);}
.route-day-tabs{display:flex;gap:4px;margin-bottom:12px;flex-wrap:wrap;}
.day-tab{padding:4px 10px;border-radius:20px;font-family:'DM Mono',monospace;font-size:10px;cursor:pointer;border:1px solid var(--border);background:transparent;color:var(--muted);transition:all 0.2s;}
.day-tab.active{background:rgba(201,168,76,0.15);border-color:var(--gold);color:var(--gold);}

.habit-item{display:flex;align-items:center;gap:10px;padding:9px 11px;border-radius:8px;margin-bottom:5px;background:rgba(255,255,255,0.02);border:1px solid var(--border);cursor:pointer;transition:all 0.15s;user-select:none;}
.habit-item.done{background:rgba(62,207,142,0.07);border-color:rgba(62,207,142,0.2);}
.habit-check{width:22px;height:22px;border-radius:50%;flex-shrink:0;border:2px solid rgba(255,255,255,0.18);background:transparent;display:flex;align-items:center;justify-content:center;font-size:11px;transition:all 0.15s;}
.habit-item.done .habit-check{background:var(--green);border-color:var(--green);color:#07070f;}
.habit-label{flex:1;font-size:14px;color:var(--muted2);transition:color 0.15s;}
.habit-item.done .habit-label{color:var(--text);}
.cat-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}

/* ── TASKS ENHANCED ── */
.task-item{border-radius:10px;margin-bottom:8px;background:rgba(255,255,255,0.02);border:1px solid var(--border);transition:all 0.15s;overflow:hidden;}
.task-item.overdue{border-color:rgba(224,85,85,0.3);background:rgba(224,85,85,0.04);}
.task-item.done-task{opacity:0.45;}
.task-top{display:flex;align-items:center;gap:10px;padding:10px 12px;cursor:pointer;}
.task-check{width:18px;height:18px;border-radius:4px;flex-shrink:0;border:2px solid rgba(255,255,255,0.18);display:flex;align-items:center;justify-content:center;font-size:10px;transition:all 0.15s;}
.task-item.done-task .task-check{background:var(--purple);border-color:var(--purple);color:#07070f;}
.prio-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0;}
.task-main{flex:1;min-width:0;}
.task-label{font-size:14px;color:var(--text);display:block;}
.task-item.done-task .task-label{text-decoration:line-through;color:var(--muted);}
.task-meta{display:flex;align-items:center;gap:6px;margin-top:3px;flex-wrap:wrap;}
.task-date{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted2);}
.task-date.overdue-lbl{color:var(--red);}
.task-cat-badge{font-family:'DM Mono',monospace;font-size:9px;padding:1px 6px;border-radius:10px;}
.task-expand-btn{background:none;border:none;color:var(--muted);cursor:pointer;font-size:11px;padding:2px 4px;flex-shrink:0;}
.task-details{padding:0 12px 10px 40px;display:none;}
.task-details.open{display:block;}
.task-notes{font-size:13px;color:var(--muted2);font-style:italic;line-height:1.5;margin-bottom:6px;white-space:pre-wrap;}
.task-link{display:inline-flex;align-items:center;gap:4px;font-size:12px;color:var(--blue);text-decoration:none;word-break:break-all;}
.task-link:hover{text-decoration:underline;}
.task-section-header{font-family:'DM Mono',monospace;font-size:9px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;padding:8px 0 6px;border-bottom:1px solid var(--border);margin-bottom:8px;}

/* ── TASK FILTER TABS ── */
.filter-tabs{display:flex;gap:4px;margin-bottom:12px;overflow-x:auto;padding-bottom:2px;}
.filter-tabs::-webkit-scrollbar{display:none;}
.filter-tab{padding:4px 10px;border-radius:20px;font-family:'DM Mono',monospace;font-size:10px;cursor:pointer;border:1px solid var(--border);background:transparent;color:var(--muted);transition:all 0.2s;white-space:nowrap;flex-shrink:0;}
.filter-tab.active{background:rgba(155,127,232,0.15);border-color:var(--purple);color:var(--purple);}

.goal-card{background:var(--bg4);border:1px solid var(--border);border-radius:10px;padding:13px;margin-bottom:8px;}
.goal-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px;}
.goal-name{font-size:15px;font-weight:600;color:var(--text);}
.goal-deadline{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);}
.goal-desc{font-size:13px;color:var(--muted2);margin-bottom:9px;line-height:1.5;font-style:italic;}
.goal-bar-wrap{display:flex;align-items:center;gap:8px;}
.goal-bar{flex:1;height:5px;background:rgba(255,255,255,0.06);border-radius:3px;overflow:hidden;}
.goal-bar-fill{height:100%;border-radius:3px;transition:width 0.5s ease;}
.goal-pct-lbl{font-family:'DM Mono',monospace;font-size:11px;min-width:34px;text-align:right;}
.goal-btns{display:flex;gap:4px;margin-top:9px;flex-wrap:wrap;}
.pct-btn{background:rgba(255,255,255,0.05);border:1px solid var(--border);border-radius:6px;padding:4px 10px;color:var(--muted2);font-family:'DM Mono',monospace;font-size:11px;cursor:pointer;transition:all 0.15s;}
.pct-btn:hover{background:rgba(201,168,76,0.1);color:var(--gold);border-color:rgba(201,168,76,0.3);}
.cat-badge{display:inline-block;font-size:9px;padding:2px 8px;border-radius:20px;font-family:'DM Mono',monospace;letter-spacing:0.5px;margin-bottom:5px;}

.week-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:5px;}
.wday{display:flex;flex-direction:column;align-items:center;gap:4px;}
.wday-lbl{font-family:'DM Mono',monospace;font-size:9px;color:var(--muted);}
.wday-num{font-family:'DM Mono',monospace;font-size:9px;color:rgba(255,255,255,0.25);}
.wday-orb{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'DM Mono',monospace;font-size:10px;border:1px solid rgba(255,255,255,0.06);}
.wday-bar{width:26px;height:3px;background:rgba(255,255,255,0.06);border-radius:2px;overflow:hidden;}
.wday-bar-fill{height:100%;border-radius:2px;}
.heat-row{display:flex;align-items:center;gap:7px;margin-bottom:7px;}
.heat-lbl{font-size:11px;color:var(--muted2);width:110px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex-shrink:0;}
.heat-cells{display:flex;gap:3px;flex:1;}
.heat-cell{flex:1;height:18px;border-radius:3px;}
.month-row{display:flex;align-items:center;gap:10px;margin-bottom:8px;}
.month-name{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted2);width:40px;}
.month-bar{flex:1;height:8px;background:rgba(255,255,255,0.05);border-radius:4px;overflow:hidden;}
.month-bar-fill{height:100%;border-radius:4px;background:var(--xp-bar);}
.month-lvl{font-family:'DM Mono',monospace;font-size:10px;color:var(--gold);width:40px;text-align:right;}

.add-form{display:flex;flex-direction:column;gap:7px;margin-top:8px;}
.add-form input,.add-form select,.add-form textarea{background:rgba(255,255,255,0.05);border:1px solid var(--border2);border-radius:8px;padding:9px 12px;color:var(--text);font-family:'Crimson Pro',serif;font-size:15px;outline:none;width:100%;}
.add-form input:focus,.add-form select:focus,.add-form textarea:focus{border-color:var(--gold);}
.add-form select option{background:var(--bg2);}
.form-row{display:flex;gap:6px;}
.btn-gold{background:linear-gradient(135deg,#c9a84c,#a07830);border:none;border-radius:8px;padding:9px 16px;color:#0a0a14;font-family:'DM Mono',monospace;font-size:12px;font-weight:500;cursor:pointer;white-space:nowrap;}
.btn-cancel{background:rgba(255,255,255,0.06);border:none;border-radius:8px;padding:9px 13px;color:var(--muted2);cursor:pointer;font-family:'DM Mono',monospace;font-size:12px;}
.btn-add{width:100%;background:transparent;border:1px dashed rgba(255,255,255,0.1);border-radius:8px;color:var(--muted);font-family:'DM Mono',monospace;font-size:11px;padding:8px;cursor:pointer;margin-top:4px;transition:all 0.2s;}
.btn-add:hover{border-color:var(--gold);color:var(--gold);}

.score-pill{display:flex;align-items:center;gap:6px;background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:20px;padding:5px 12px;margin-bottom:12px;}
.score-num{font-family:'DM Mono',monospace;font-size:20px;font-weight:500;}
.score-bar-wrap{flex:1;height:4px;background:rgba(255,255,255,0.07);border-radius:2px;overflow:hidden;}
.score-bar-fill{height:100%;border-radius:2px;transition:width 0.6s ease;}

#toast{position:fixed;bottom:72px;left:50%;transform:translateX(-50%) translateY(10px);background:var(--bg4);border:1px solid rgba(201,168,76,0.3);border-radius:30px;padding:8px 18px;font-size:13px;color:var(--gold);opacity:0;transition:all 0.3s;pointer-events:none;z-index:999;white-space:nowrap;font-family:'DM Mono',monospace;}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.empty{text-align:center;padding:24px 0;color:var(--muted);font-size:14px;font-style:italic;}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:none;}}
.card,.goal-card,.route-step,.task-item{animation:fadeUp 0.2s ease;}
</style>
</head>
<body>
<div id="loading"><div class="spin"></div><p>CARREGANDO...</p></div>
<div id="app" style="display:none">
  <div id="char-banner"></div>
  <div id="content"></div>
  <nav>
    <button class="active" onclick="showView('hoje')"><span class="ni">☀️</span>Hoje</button>
    <button onclick="showView('rota')"><span class="ni">🗺️</span>Rota</button>
    <button onclick="showView('habitos')"><span class="ni">⚡</span>Hábitos</button>
    <button onclick="showView('tarefas')"><span class="ni">📋</span>Tarefas</button>
    <button onclick="showView('semana')"><span class="ni">📅</span>Semana</button>
    <button onclick="showView('metas')"><span class="ni">🎯</span>Metas</button>
  </nav>
</div>
<div id="toast"></div>

<script>
const SUPA_URL='https://ynibehkkwcmnghethyxn.supabase.co';
const SUPA_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InluaWJlaGtrd2NtbmdoZXRoeXhuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMyNDY2MzIsImV4cCI6MjA4ODgyMjYzMn0.ZHQsPuVO0pXPzShw82hm6eecBdf4sE5t6LnP4mriv5o';
const sb=supabase.createClient(SUPA_URL,SUPA_KEY);

const CATS=[
  {id:'saude',    label:'Saúde',    icon:'⚡',color:'#3ecf8e'},
  {id:'carreira', label:'Carreira', icon:'🎯',color:'#4d8ef0'},
  {id:'mente',    label:'Mente',    icon:'🧠',color:'#9b7fe8'},
  {id:'conexoes', label:'Conexões', icon:'🤝',color:'#e8a030'},
  {id:'pessoal',  label:'Pessoal',  icon:'👤',color:'#e05585'},
  {id:'financas', label:'Finanças', icon:'💰',color:'#c9a84c'},
];
const PRIOS={
  alta: {label:'Alta', color:'#e05555'},
  media:{label:'Média',color:'#e8a030'},
  baixa:{label:'Baixa',color:'#5a5a78'},
};
const DAYS_PT=['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];
const MONTHS_PT=['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
const TITLES=['Iniciante','Aprendiz','Disciplinado','Focado','Determinado','Consistente','Resiliente','Estrategista','Líder','Mestre'];
const AVATARS=['🌱','🧑','💪','⚔️','🛡️','🏹','🔥','⚡','👑','🌟'];

let STATE={habits:[],habitCompletions:[],routeSteps:[],routeCompletions:[],tasks:[],goals:[]};
let currentView='hoje';
let rotaEditDay='weekday';
let taskFilter='todas';
let expandedTasks=new Set();

function dateKey(d){return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;}
function todayKey(){return dateKey(new Date());}
function getDayType(d){const w=d.getDay();return(w===0||w===6)?'weekend':'weekday';}
function catOf(id){return CATS.find(c=>c.id===id)||{label:id,icon:'•',color:'#888'};}
function set(html){document.getElementById('content').innerHTML=html;}
function toast(msg){
  const el=document.getElementById('toast');
  el.textContent=msg;el.classList.add('show');
  clearTimeout(el._t);el._t=setTimeout(()=>el.classList.remove('show'),2200);
}
function isOverdue(t){
  if(t.done||!t.due_date) return false;
  return t.due_date < todayKey();
}
function formatDate(dk){
  if(!dk) return '';
  const [y,m,d]=dk.split('-');
  return `${d}/${m}/${y}`;
}
function toggleTaskExpand(id){
  if(expandedTasks.has(id)) expandedTasks.delete(id);
  else expandedTasks.add(id);
  renderCurrent();
}

async function loadAll(){
  const [h,hc,rs,rc,t,g]=await Promise.all([
    sb.from('habits').select('*').order('created_at'),
    sb.from('habit_completions').select('*'),
    sb.from('route_steps').select('*').order('position'),
    sb.from('route_completions').select('*'),
    sb.from('tasks').select('*').order('due_date',{ascending:true,nullsFirst:false}),
    sb.from('goals').select('*').order('created_at'),
  ]);
  STATE.habits=h.data||[];
  STATE.habitCompletions=hc.data||[];
  STATE.routeSteps=rs.data||[];
  STATE.routeCompletions=rc.data||[];
  STATE.tasks=t.data||[];
  STATE.goals=g.data||[];
}

// ── RPG ──
function calcDayXP(dk){
  const hD=STATE.habitCompletions.filter(c=>c.date_key===dk).length;
  const rD=STATE.routeCompletions.filter(c=>c.date_key===dk).length;
  const tD=STATE.tasks.filter(t=>t.date_key===dk&&t.done).length;
  return hD*20+rD*15+tD*25;
}
function totalXP(){
  const keys=new Set([...STATE.habitCompletions.map(c=>c.date_key),...STATE.routeCompletions.map(c=>c.date_key),...STATE.tasks.map(t=>t.date_key)]);
  let xp=0;keys.forEach(k=>xp+=calcDayXP(k));return xp;
}
function xpToLevel(xp){return Math.min(10,Math.floor(xp/500)+1);}
function xpProgress(xp){
  const lvl=xpToLevel(xp);
  if(lvl>=10)return{current:xp,needed:xp,pct:100};
  const base=(lvl-1)*500,next=lvl*500;
  return{current:xp-base,needed:next-base,pct:Math.round(((xp-base)/(next-base))*100)};
}
function catAttributes(){
  const last30=Array.from({length:30},(_,i)=>{const d=new Date();d.setDate(d.getDate()-i);return dateKey(d);});
  const attrs={};
  CATS.forEach(c=>{
    const ch=STATE.habits.filter(h=>h.cat===c.id);
    if(!ch.length){attrs[c.id]=0;return;}
    let total=0,done=0;
    last30.forEach(dk=>{
      const comp=STATE.habitCompletions.filter(x=>x.date_key===dk).map(x=>x.habit_id);
      ch.forEach(h=>{total++;if(comp.includes(h.id))done++;});
    });
    attrs[c.id]=Math.round((done/Math.max(total,1))*100);
  });
  return attrs;
}
function renderCharBanner(){
  const xp=totalXP(),lvl=xpToLevel(xp),prog=xpProgress(xp);
  const title=TITLES[Math.min(lvl-1,TITLES.length-1)];
  const avatar=AVATARS[Math.min(lvl-1,AVATARS.length-1)];
  const attrs=catAttributes();
  const attrBars=CATS.slice(0,4).map(c=>{
    const val=attrs[c.id]||0,h=Math.max(4,Math.round((val/100)*28));
    return `<div class="attr-pip"><div class="attr-pip-bar" style="height:${h}px;background:${c.color};opacity:${val>0?0.85:0.2}"></div><div class="attr-pip-label">${c.icon}</div></div>`;
  }).join('');
  document.getElementById('char-banner').innerHTML=`
    <div class="char-avatar">${avatar}<div class="level-badge">LV${lvl}</div></div>
    <div class="char-info">
      <div class="char-name">Jota</div>
      <div class="char-title">${title}</div>
      <div class="xp-wrap"><div class="xp-bar-bg"><div class="xp-bar-fill" style="width:${prog.pct}%"></div></div><div class="xp-text">${prog.current}/${prog.needed} XP</div></div>
      <div class="char-attrs">${attrBars}</div>
    </div>`;
}

function calcScore(){
  const tk=todayKey(),today=new Date(),dayType=getDayType(today);
  const route=STATE.routeSteps.filter(s=>s.day_type===dayType);
  const rD=STATE.routeCompletions.filter(c=>c.date_key===tk).length;
  const hD=STATE.habitCompletions.filter(c=>c.date_key===tk).length;
  const todayT=STATE.tasks.filter(t=>t.date_key===tk);
  const tD=todayT.filter(t=>t.done).length;
  const total=route.length+STATE.habits.length+todayT.length;
  if(!total)return 0;
  return Math.round(((rD+hD+tD)/total)*100);
}

function showView(v){
  currentView=v;
  document.querySelectorAll('nav button').forEach((b,i)=>{
    b.classList.toggle('active',['hoje','rota','habitos','tarefas','semana','metas'][i]===v);
  });
  renderCurrent();
}

function renderCurrent(){
  renderCharBanner();
  if(currentView==='hoje')         renderHoje();
  else if(currentView==='rota')    renderRota();
  else if(currentView==='habitos') renderHabitos();
  else if(currentView==='tarefas') renderTarefas();
  else if(currentView==='semana')  renderSemana();
  else if(currentView==='metas')   renderMetas();
}

// ── TASK CARD HTML ──
function taskCardHtml(t,showDateLabel){
  const p=PRIOS[t.priority]||PRIOS.media;
  const c=catOf(t.cat||'pessoal');
  const overdue=isOverdue(t);
  const expanded=expandedTasks.has(t.id);
  const hasDetails=t.notes||t.link;
  let dateHtml='';
  if(t.due_date){
    const isToday=t.due_date===todayKey();
    const lbl=isToday?'hoje':formatDate(t.due_date);
    dateHtml=`<span class="task-date ${overdue?'overdue-lbl':''}">${overdue?'⚠️ ':isToday?'📅 ':'📅 '}${lbl}</span>`;
  }
  return `<div class="task-item ${overdue?'overdue':''} ${t.done?'done-task':''}" id="task-${t.id}">
    <div class="task-top">
      <div class="task-check" onclick="toggleTask('${t.id}',${t.done})">${t.done?'✓':''}</div>
      <div class="prio-dot" style="background:${p.color}"></div>
      <div class="task-main">
        <span class="task-label">${t.text}</span>
        <div class="task-meta">
          ${dateHtml}
          <span class="task-cat-badge" style="background:${c.color}18;color:${c.color}">${c.icon} ${c.label}</span>
        </div>
      </div>
      ${hasDetails?`<button class="task-expand-btn" onclick="toggleTaskExpand('${t.id}')">${expanded?'▲':'▼'}</button>`:''}
      <button class="del-btn" onclick="delTask('${t.id}')">✕</button>
    </div>
    ${hasDetails?`<div class="task-details ${expanded?'open':''}">
      ${t.notes?`<div class="task-notes">${t.notes}</div>`:''}
      ${t.link?`<a class="task-link" href="${t.link}" target="_blank">🔗 ${t.link}</a>`:''}
    </div>`:''}
  </div>`;
}

// ── HOJE ──
function renderHoje(){
  const tk=todayKey(),today=new Date(),dayType=getDayType(today);
  const route=STATE.routeSteps.filter(s=>s.day_type===dayType).sort((a,b)=>a.position-b.position);
  const routeDoneIds=STATE.routeCompletions.filter(c=>c.date_key===tk).map(c=>c.step_id);
  const habitDoneIds=STATE.habitCompletions.filter(c=>c.date_key===tk).map(c=>c.habit_id);
  const todayTasks=STATE.tasks.filter(t=>t.date_key===tk);
  const nextStep=route.find(s=>!routeDoneIds.includes(s.id));
  const score=calcScore();
  const sc=score>=80?'#3ecf8e':score>=50?'#e8a030':'#4d8ef0';
  const se=score>=80?'🔥':score>=50?'💪':'⚡';

  let html=`<div class="score-pill">
    <div class="score-num" style="color:${sc}">${score}%</div>
    <div class="score-bar-wrap"><div class="score-bar-fill" style="width:${score}%;background:${sc}"></div></div>
    <span style="font-size:16px">${se}</span>
    <div style="font-family:'DM Mono',monospace;font-size:10px;color:var(--muted)">${DAYS_PT[today.getDay()]}, ${today.getDate()} ${MONTHS_PT[today.getMonth()]}</div>
  </div>`;

  if(route.length>0){
    html+=`<div class="card"><div class="card-title">Rota do dia <span>${routeDoneIds.length}/${route.length}</span></div>`;
    if(nextStep){
      html+=`<div class="route-step current" onclick="completeStep('${nextStep.id}')">
        <div class="step-num">${route.indexOf(nextStep)+1}</div>
        <span class="step-name">▶ ${nextStep.name}</span>
        <span style="font-size:11px;color:var(--gold);font-family:'DM Mono',monospace">próximo</span>
      </div>`;
    } else {
      html+=`<div style="text-align:center;padding:8px 0;font-size:13px;color:var(--green)">✓ Rota completa hoje!</div>`;
    }
    html+=`<div style="display:flex;gap:3px;margin-top:8px">`;
    route.forEach(s=>{const d=routeDoneIds.includes(s.id);html+=`<div style="flex:1;height:4px;border-radius:2px;background:${d?'var(--gold)':'rgba(255,255,255,0.07)'}"></div>`;});
    html+=`</div></div>`;
  }

  html+=`<div class="card"><div class="card-title">Hábitos <span>${habitDoneIds.length}/${STATE.habits.length}</span></div>`;
  if(!STATE.habits.length) html+=`<div class="empty">Nenhum hábito cadastrado</div>`;
  STATE.habits.forEach(h=>{
    const done=habitDoneIds.includes(h.id),c=catOf(h.cat);
    html+=`<div class="habit-item ${done?'done':''}" onclick="toggleHabit('${h.id}','${tk}')">
      <div class="habit-check">${done?'✓':''}</div>
      <div class="cat-dot" style="background:${c.color}"></div>
      <span class="habit-label">${c.icon} ${h.name}</span>
      <button class="del-btn" onclick="event.stopPropagation();delHabit('${h.id}')">✕</button>
    </div>`;
  });
  html+=`<div id="hf-hoje"></div><button class="btn-add" onclick="showHabitForm('hf-hoje')">+ Hábito</button></div>`;

  html+=`<div class="card"><div class="card-title">Tarefas de hoje <span style="color:var(--purple)">${todayTasks.filter(t=>t.done).length}/${todayTasks.length}</span></div>`;
  if(!todayTasks.length) html+=`<div class="empty">Sem tarefas para hoje 🎉</div>`;
  todayTasks.forEach(t=>{ html+=taskCardHtml(t,false); });
  html+=`<div id="tf-hoje"></div><button class="btn-add" onclick="showTaskForm('tf-hoje','${tk}')">+ Tarefa</button></div>`;
  set(html);
}

// ── ROTA ──
function renderRota(){
  const tk=todayKey(),today=new Date(),todayType=getDayType(today);
  const route=STATE.routeSteps.filter(s=>s.day_type===rotaEditDay).sort((a,b)=>a.position-b.position);
  const routeDoneIds=rotaEditDay===todayType?STATE.routeCompletions.filter(c=>c.date_key===tk).map(c=>c.step_id):[];

  let html=`<div class="card"><div class="card-title">Rota de Hábitos</div>
    <div class="route-day-tabs">
      <button class="day-tab ${rotaEditDay==='weekday'?'active':''}" onclick="switchRotaDay('weekday')">📅 Dias de Semana</button>
      <button class="day-tab ${rotaEditDay==='weekend'?'active':''}" onclick="switchRotaDay('weekend')">🌴 Final de Semana</button>
    </div>`;
  if(!route.length) html+=`<div class="empty">Nenhuma etapa na rota</div>`;
  route.forEach((s,idx)=>{
    const done=routeDoneIds.includes(s.id);
    const isNext=rotaEditDay===todayType&&!done&&route.find(x=>!routeDoneIds.includes(x.id))?.id===s.id;
    const locked=rotaEditDay===todayType&&!done&&!isNext;
    const isLast=idx===route.length-1;
    html+=`<div class="route-step ${done?'completed':isNext?'current':locked?'locked':''}" style="cursor:pointer"
      onclick="${rotaEditDay===todayType&&!done&&!locked?`completeStep('${s.id}')`:done?`uncompleteStep('${s.id}')`:''}" >
      <div class="step-num">${done?'✓':idx+1}</div>
      <span class="step-name">${s.name}</span>
      <button class="del-btn" onclick="event.stopPropagation();delStep('${s.id}')">✕</button>
      ${!isLast?'<div class="step-connector"></div>':''}
    </div>`;
  });
  html+=`<div id="rf-form"></div><button class="btn-add" onclick="showRouteForm()">+ Etapa</button></div>`;
  if(rotaEditDay===todayType&&route.length){
    const done=routeDoneIds.length,pct=Math.round((done/route.length)*100);
    html+=`<div class="card"><div class="card-title">Progresso de hoje <span>${done}/${route.length}</span></div>
      <div style="height:8px;background:rgba(255,255,255,0.06);border-radius:4px;overflow:hidden">
        <div style="height:100%;width:${pct}%;background:var(--xp-bar);border-radius:4px;transition:width 0.6s"></div>
      </div>
      <div style="font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);margin-top:6px">${pct}% concluído · +${done*15} XP</div>
    </div>`;
  }
  set(html);
}

// ── TAREFAS (nova aba completa) ──
function renderTarefas(){
  const tk=todayKey();
  const overdueList=STATE.tasks.filter(t=>isOverdue(t));
  const pendingList=STATE.tasks.filter(t=>!t.done&&!isOverdue(t));
  const doneList=STATE.tasks.filter(t=>t.done);

  // Sort pending: prioridade -> data
  const priOrder={alta:0,media:1,baixa:2};
  pendingList.sort((a,b)=>{
    const pd=(priOrder[a.priority]||1)-(priOrder[b.priority]||1);
    if(pd!==0)return pd;
    if(a.due_date&&b.due_date)return a.due_date.localeCompare(b.due_date);
    if(a.due_date)return -1;
    if(b.due_date)return 1;
    return 0;
  });

  const filters=[
    {id:'todas',label:'Todas'},
    ...CATS.map(c=>({id:c.id,label:c.icon+' '+c.label})),
  ];

  let html=`<div class="filter-tabs">`;
  filters.forEach(f=>{
    html+=`<button class="filter-tab ${taskFilter===f.id?'active':''}" onclick="setTaskFilter('${f.id}')">${f.label}</button>`;
  });
  html+=`</div>`;

  // Filter
  function filterTasks(list){
    if(taskFilter==='todas')return list;
    return list.filter(t=>(t.cat||'pessoal')===taskFilter);
  }

  // Overdue
  const filteredOverdue=filterTasks(overdueList);
  if(filteredOverdue.length){
    html+=`<div class="card" style="border-color:rgba(224,85,85,0.2)">
      <div class="card-title" style="color:var(--red)">⚠️ Fora do prazo <span style="color:var(--red)">${filteredOverdue.length}</span></div>`;
    filteredOverdue.forEach(t=>{ html+=taskCardHtml(t,true); });
    html+=`</div>`;
  }

  // Pending
  const filteredPending=filterTasks(pendingList);
  html+=`<div class="card">
    <div class="card-title">Pendentes <span>${filteredPending.length}</span></div>`;
  if(!filteredPending.length) html+=`<div class="empty">Nenhuma tarefa pendente 🎉</div>`;

  // Group by category
  if(taskFilter==='todas'){
    const byCat={};
    filteredPending.forEach(t=>{
      const cid=t.cat||'pessoal';
      if(!byCat[cid])byCat[cid]=[];
      byCat[cid].push(t);
    });
    CATS.forEach(c=>{
      if(!byCat[c.id]||!byCat[c.id].length)return;
      html+=`<div class="task-section-header">${c.icon} ${c.label}</div>`;
      byCat[c.id].forEach(t=>{ html+=taskCardHtml(t,true); });
    });
  } else {
    filteredPending.forEach(t=>{ html+=taskCardHtml(t,true); });
  }
  html+=`<div id="tf-tab"></div><button class="btn-add" onclick="showTaskForm('tf-tab',null)">+ Nova tarefa</button></div>`;

  // Done
  const filteredDone=filterTasks(doneList).slice(0,10);
  if(filteredDone.length){
    html+=`<div class="card"><div class="card-title">Concluídas <span style="color:var(--green)">${filteredDone.length}</span></div>`;
    filteredDone.forEach(t=>{ html+=taskCardHtml(t,true); });
    html+=`</div>`;
  }

  set(html);
}

function setTaskFilter(f){taskFilter=f;renderTarefas();}

  const last7=Array.from({length:7},(_,i)=>{const d=new Date(today);d.setDate(d.getDate()-(6-i));return{d,key:dateKey(d),lbl:DAYS_PT[d.getDay()],num:d.getDate()};});
  let html=`<div class="card"><div class="card-title">Últimos 7 dias</div><div class="week-grid">`;

    const hD=STATE.habitCompletions.filter(c=>c.date_key===key).length;

    const rT=STATE.routeSteps.filter(s=>s.day_type===getDayType(d)).length;

      <div class="wday-orb" style="background:${pct>=50?bc+'22':'rgba(255,255,255,0.03)'};border-color:${isToday?'rgba(201,168,76,0.35)':'rgba(255,255,255,0.06)'};color:${done>0?bc:'var(--muted)'}">
        ${done}
      </div>
      <div class="wday-bar"><div class="wday-bar-fill" style="width:${pct}%;background:${bc}"></div></div>
    </div>`;
  });
  html+=`</div></div>`;
  html+=`<div class="card"><div class="card-title">Hábitos</div>`;
  STATE.habits.forEach(h=>{
    const c=catOf(h.cat);
    html+=`<div class="heat-row"><div class="heat-lbl">${c.icon} ${h.name}</div><div class="heat-cells">`;
    last7.forEach(({key})=>{
      const done=STATE.habitCompletions.some(x=>x.habit_id===h.id&&x.date_key===key);
      html+=`<div class="heat-cell" style="background:${done?c.color+'55':'rgba(255,255,255,0.04)'}"></div>`;
    });
    html+=`</div></div>`;
  });
  html+=`</div>`;
  html+=`<div class="card"><div class="card-title">Rota</div>`;
  last7.forEach(({d,key,lbl,num})=>{
    const rT=STATE.routeSteps.filter(s=>s.day_type===getDayType(d)).length;

    html+=`<div class="heat-row"><div class="heat-lbl">${lbl} ${num}</div>
      <div style="flex:1;height:18px;border-radius:4px;background:rgba(255,255,255,0.04);overflow:hidden;position:relative">
        <div style="height:100%;width:${pct}%;background:linear-gradient(90deg,rgba(201,168,76,0.5),rgba(201,168,76,0.25));border-radius:4px"></div>
        <span style="position:absolute;right:6px;top:50%;transform:translateY(-50%);font-family:'DM Mono',monospace;font-size:9px;color:var(--muted)">${done}/${rT}</span>
      </div></div>`;
  });
  html+=`</div>`;
  set(html);
}

// ── ACTIONS ──
async function toggleHabit(habitId,dk){
  const exists=STATE.habitCompletions.find(c=>c.habit_id===habitId&&c.date_key===dk);
  if(exists){
    await sb.from('habit_completions').delete().eq('id',exists.id);
    STATE.habitCompletions=STATE.habitCompletions.filter(c=>c.id!==exists.id);
  } else {
    const{data}=await sb.from('habit_completions').insert({habit_id:habitId,date_key:dk}).select().single();
    if(data){STATE.habitCompletions.push(data);toast('✓ +20 XP');}
  }
  renderCurrent();
}
async function delHabit(id){
  await sb.from('habits').delete().eq('id',id);
  STATE.habits=STATE.habits.filter(h=>h.id!==id);
  STATE.habitCompletions=STATE.habitCompletions.filter(c=>c.habit_id!==id);
  renderCurrent();toast('Hábito removido');
}
async function completeStep(stepId){
  const tk=todayKey();
  const exists=STATE.routeCompletions.find(c=>c.step_id===stepId&&c.date_key===tk);
  if(!exists){
    const{data}=await sb.from('route_completions').insert({step_id:stepId,date_key:tk}).select().single();
    if(data){STATE.routeCompletions.push(data);toast('⚔️ +15 XP');}
  }
  renderCurrent();
}
async function uncompleteStep(stepId){
  const tk=todayKey();
  const exists=STATE.routeCompletions.find(c=>c.step_id===stepId&&c.date_key===tk);
  if(exists){
    await sb.from('route_completions').delete().eq('id',exists.id);
    STATE.routeCompletions=STATE.routeCompletions.filter(c=>c.id!==exists.id);
  }
  renderCurrent();
}
async function delStep(id){
  await sb.from('route_steps').delete().eq('id',id);
  STATE.routeSteps=STATE.routeSteps.filter(s=>s.id!==id);
  STATE.routeCompletions=STATE.routeCompletions.filter(c=>c.step_id!==id);
  renderCurrent();toast('Etapa removida');
}
async function toggleTask(id,currentDone){
  const done=currentDone===true||currentDone==='true';
  await sb.from('tasks').update({done:!done}).eq('id',id);
  const t=STATE.tasks.find(t=>t.id===id);
  if(t){t.done=!done;if(!done)toast('✓ +25 XP');}
  renderCurrent();
}
async function delTask(id){
  await sb.from('tasks').delete().eq('id',id);
  STATE.tasks=STATE.tasks.filter(t=>t.id!==id);
  expandedTasks.delete(id);
  renderCurrent();toast('Tarefa removida');
}
async function delGoal(id){
  await sb.from('goals').delete().eq('id',id);
  STATE.goals=STATE.goals.filter(g=>g.id!==id);
  renderCurrent();toast('Meta removida');
}
async function adjGoal(id,delta){
  const g=STATE.goals.find(g=>g.id===id);
  if(!g)return;
  g.pct=Math.max(0,Math.min(100,g.pct+delta));
  await sb.from('goals').update({pct:g.pct}).eq('id',id);
  if(g.pct===100)toast('🏆 Meta concluída!');
  renderCurrent();
}

// ── FORMS ──
function showHabitForm(cid){
  const el=document.getElementById(cid);if(!el)return;
  el.innerHTML=`<div class="add-form">
    <input id="hf-n" placeholder="Nome do hábito..." autocomplete="off"/>
    <div class="form-row">
      <select id="hf-c" style="flex:1">${CATS.slice(0,4).map(c=>`<option value="${c.id}">${c.icon} ${c.label}</option>`).join('')}</select>
      <button class="btn-gold" onclick="submitHabit('${cid}')">+ Add</button>
      <button class="btn-cancel" onclick="cancelF('${cid}')">✕</button>
    </div></div>`;
  const inp=document.getElementById('hf-n');inp.focus();
  inp.onkeydown=e=>{if(e.key==='Enter')submitHabit(cid);};
}
async function submitHabit(cid){
  const name=(document.getElementById('hf-n')||{}).value?.trim();if(!name)return;
  const cat=document.getElementById('hf-c')?.value||'mente';
  const{data}=await sb.from('habits').insert({name,cat}).select().single();
  if(data){STATE.habits.push(data);toast('Hábito adicionado! ⚡');}
  renderCurrent();
}

function showRouteForm(){
  const el=document.getElementById('rf-form');if(!el)return;
  const maxPos=STATE.routeSteps.filter(s=>s.day_type===rotaEditDay).reduce((m,s)=>Math.max(m,s.position),0);
  el.innerHTML=`<div class="add-form">
    <input id="rf-n" placeholder="Nome da etapa..." autocomplete="off"/>
    <div class="form-row">
      <button class="btn-gold" style="flex:1" onclick="submitRoute(${maxPos+1})">+ Adicionar etapa</button>
      <button class="btn-cancel" onclick="cancelF('rf-form')">✕</button>
    </div></div>`;
  const inp=document.getElementById('rf-n');inp.focus();
  inp.onkeydown=e=>{if(e.key==='Enter')submitRoute(maxPos+1);};
}
async function submitRoute(pos){
  const name=(document.getElementById('rf-n')||{}).value?.trim();if(!name)return;
  const{data}=await sb.from('route_steps').insert({name,day_type:rotaEditDay,position:pos}).select().single();
  if(data){STATE.routeSteps.push(data);toast('Etapa adicionada!');}
  renderCurrent();
}

function showTaskForm(cid, defaultDate){
  const el=document.getElementById(cid);if(!el)return;
  const dd=defaultDate||todayKey();
  el.innerHTML=`<div class="add-form">
    <input id="tf-n" placeholder="Descrição da tarefa..." autocomplete="off"/>
    <textarea id="tf-obs" placeholder="Observações (opcional)..." rows="2" style="font-family:'Crimson Pro',serif;font-size:14px"></textarea>
    <input id="tf-link" placeholder="Link (opcional, ex: https://...)" autocomplete="off"/>
    <div class="form-row">
      <select id="tf-cat" style="flex:1">${CATS.map(c=>`<option value="${c.id}">${c.icon} ${c.label}</option>`).join('')}</select>
      <select id="tf-p" style="flex:1">${Object.entries(PRIOS).map(([k,v])=>`<option value="${k}">${v.label}</option>`).join('')}</select>
    </div>
    <div class="form-row">
      <input id="tf-date" type="date" value="${dd}" style="flex:1"/>
    </div>
    <div class="form-row">
      <button class="btn-gold" style="flex:1" onclick="submitTask('${cid}')">+ Adicionar</button>
      <button class="btn-cancel" onclick="cancelF('${cid}')">✕</button>
    </div></div>`;
  document.getElementById('tf-n').focus();
  document.getElementById('tf-n').onkeydown=e=>{if(e.key==='Enter')submitTask(cid);};
}
async function submitTask(cid){
  const text=(document.getElementById('tf-n')||{}).value?.trim();if(!text)return;
  const priority=document.getElementById('tf-p')?.value||'media';
  const cat=document.getElementById('tf-cat')?.value||'pessoal';
  const due_date=document.getElementById('tf-date')?.value||todayKey();
  const notes=document.getElementById('tf-obs')?.value?.trim()||null;
  const link=document.getElementById('tf-link')?.value?.trim()||null;
  const{data}=await sb.from('tasks').insert({text,priority,cat,done:false,date_key:due_date,due_date,notes,link}).select().single();
  if(data){STATE.tasks.push(data);toast('Tarefa adicionada! +25 XP');}
  renderCurrent();
}

function showGoalForm(){
  const el=document.getElementById('gf-form');if(!el)return;
  el.innerHTML=`<div class="add-form">
    <input id="gf-t" placeholder="Título da meta..." autocomplete="off"/>
    <textarea id="gf-d" placeholder="Descrição (opcional)..." rows="2" style="font-family:'Crimson Pro',serif;font-size:14px"></textarea>
    <div class="form-row">
      <select id="gf-c" style="flex:1">${CATS.map(c=>`<option value="${c.id}">${c.icon} ${c.label}</option>`).join('')}</select>
      <input id="gf-dl" placeholder="Prazo ex: Dez 2026" style="flex:1"/>
    </div>
    <div class="form-row">
      <button class="btn-gold" style="flex:1" onclick="submitGoal()">Salvar meta</button>
      <button class="btn-cancel" onclick="cancelF('gf-form')">✕</button>
    </div></div>`;
  document.getElementById('gf-t').focus();
}
async function submitGoal(){
  const title=(document.getElementById('gf-t')||{}).value?.trim();if(!title)return;
  const{data}=await sb.from('goals').insert({
    title,description:document.getElementById('gf-d')?.value?.trim()||'',
    cat:document.getElementById('gf-c')?.value||'mente',pct:0,
    deadline:document.getElementById('gf-dl')?.value?.trim()||'—'
  }).select().single();
  if(data){STATE.goals.push(data);toast('Meta criada! 🎯');}
  renderCurrent();
}

function switchRotaDay(type){rotaEditDay=type;renderRota();}
function cancelF(cid){const el=document.getElementById(cid);if(el)el.innerHTML='';}

// ── INIT ──
(async()=>{
  await loadAll();
  document.getElementById('loading').style.display='none';
  document.getElementById('app').style.display='flex';
  renderCurrent();
})();
</script>
